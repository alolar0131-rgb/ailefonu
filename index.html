<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Aile Fonu – Çok Yakında</title>
  <meta name="description" content="Aile Fonu internet sitesi çok yakında sizlerle!"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }

    body {
      font-family: 'Inter', sans-serif;
      background: #06080f;
      color: #e8e4d9;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Animated background */
    .bg-glow {
      position: fixed; inset: 0; z-index: 0;
      background:
        radial-gradient(ellipse 80% 60% at 50% 0%, rgba(13,27,62,.95) 0%, transparent 70%),
        radial-gradient(ellipse 60% 50% at 20% 80%, rgba(100,30,30,.4) 0%, transparent 60%),
        radial-gradient(ellipse 50% 60% at 80% 70%, rgba(13,27,62,.6) 0%, transparent 60%);
      background-color: #06080f;
    }

    /* Floating particles */
    .particles { position: fixed; inset: 0; z-index: 1; pointer-events: none; }
    .particle {
      position: absolute;
      border-radius: 50%;
      background: rgba(201,168,76,.15);
      animation: floatUp linear infinite;
    }

    @keyframes floatUp {
      0%   { transform: translateY(100vh) scale(0); opacity: 0; }
      10%  { opacity: 1; }
      90%  { opacity: .5; }
      100% { transform: translateY(-10vh) scale(1); opacity: 0; }
    }

    /* Main card */
    .card {
      position: relative; z-index: 10;
      text-align: center;
      padding: 60px 48px 56px;
      max-width: 680px; width: 90%;
      background: rgba(255,255,255,.03);
      border: 1px solid rgba(201,168,76,.2);
      border-radius: 24px;
      backdrop-filter: blur(20px);
      box-shadow:
        0 0 80px rgba(201,168,76,.06),
        0 40px 100px rgba(0,0,0,.7),
        inset 0 1px 0 rgba(255,255,255,.06);
      animation: fadeIn .9s ease forwards;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Logo */
    .logo {
      font-size: 2.8rem;
      margin-bottom: 6px;
      animation: spin-slow 8s linear infinite;
      display: inline-block;
    }
    @keyframes spin-slow {
      0%   { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .brand {
      font-family: 'Playfair Display', serif;
      font-size: 2.4rem; font-weight: 900;
      background: linear-gradient(135deg, #fff 30%, #f0d080 70%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: .04em;
      margin-bottom: 6px;
    }

    .tagline {
      color: #c9a84c;
      font-size: .9rem; letter-spacing: .12em;
      text-transform: uppercase; font-weight: 600;
      margin-bottom: 36px;
    }

    /* Divider */
    .divider {
      width: 80px; height: 2px;
      background: linear-gradient(90deg, transparent, #c9a84c, transparent);
      margin: 0 auto 36px;
    }

    /* ⭐ KIRMIZI ANA MESAJ */
    .main-message {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.3rem, 3.5vw, 1.8rem);
      font-weight: 700;
      color: #ff3b3b;
      text-shadow:
        0 0 20px rgba(255,59,59,.5),
        0 0 40px rgba(255,59,59,.25);
      line-height: 1.4;
      margin-bottom: 12px;
      animation: redPulse 2.5s ease-in-out infinite;
    }
    @keyframes redPulse {
      0%,100% { text-shadow: 0 0 20px rgba(255,59,59,.5), 0 0 40px rgba(255,59,59,.2); }
      50%      { text-shadow: 0 0 35px rgba(255,59,59,.9), 0 0 70px rgba(255,59,59,.4); }
    }

    /* Gear icons */
    .gears {
      font-size: 1.8rem;
      display: inline-flex; gap: 8px; align-items: center;
      margin-bottom: 28px;
    }
    .gear-spin  { display: inline-block; animation: spin 3s linear infinite; }
    .gear-spin2 { display: inline-block; animation: spin 2s linear infinite reverse; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Description */
    .description {
      color: #8e8a9d;
      font-size: .95rem; line-height: 1.8;
      max-width: 480px; margin: 0 auto 40px;
    }

    /* Progress bar */
    .progress-wrap {
      margin-bottom: 40px;
    }
    .progress-label {
      display: flex; justify-content: space-between;
      font-size: .78rem; color: #6e6a7d;
      text-transform: uppercase; letter-spacing: .06em;
      margin-bottom: 10px;
    }
    .progress-label span:last-child { color: #c9a84c; font-weight: 700; }
    .progress-bar {
      height: 6px; background: rgba(255,255,255,.06);
      border-radius: 999px; overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #8a6a1a, #c9a84c, #f0d080);
      border-radius: 999px;
      width: 0%;
      animation: fillBar 2s 0.5s ease forwards;
    }
    @keyframes fillBar {
      to { width: 85%; }
    }

    /* Footer note */
    .footer-note {
      margin-top: 36px;
      padding-top: 24px;
      border-top: 1px solid rgba(255,255,255,.06);
      color: rgba(255,255,255,.2);
      font-size: .78rem; letter-spacing: .04em;
    }
    .footer-note strong { color: rgba(201,168,76,.5); }

  </style>
</head>
<body>

<div class="bg-glow"></div>

<!-- Floating particles -->
<div class="particles" id="particles"></div>

<!-- Main Card -->
<div class="card">
  <div class="logo">🏛️</div>
  <div class="brand">AİLE FONU</div>
  <p class="tagline">Birlikte Daha Güçlü Geleceğe</p>
  <div class="divider"></div>

  <p class="main-message">
    Aile Fonu internet sitesi çok yakında sizlerle
  </p>

  <div class="gears">
    <span class="gear-spin">⚙️</span>
    <span class="gear-spin2">⚙️</span>
  </div>

  <p class="description">
    Sitemiz şu anda yapım aşamasındadır. En kısa sürede tüm içeriklerimizle birlikte hizmetinize sunulacaktır.
  </p>

  <div class="progress-wrap">
    <div class="progress-label">
      <span>Yapım Aşaması</span>
      <span>%85</span>
    </div>
    <div class="progress-bar">
      <div class="progress-fill"></div>
    </div>
  </div>

  <div class="footer-note">
    <strong>🏛️ Aile Fonu</strong> &nbsp;·&nbsp; Haziran 2023'ten bugüne &nbsp;·&nbsp; Dayanışma ile güçlü yarınlara
  </div>
</div>

<script>
  // Generate floating particles
  const container = document.getElementById('particles');
  for (let i = 0; i < 25; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const size = Math.random() * 6 + 2;
    p.style.cssText = `
      width: ${size}px; height: ${size}px;
      left: ${Math.random() * 100}%;
      animation-duration: ${Math.random() * 15 + 10}s;
      animation-delay: ${Math.random() * 10}s;
      opacity: ${Math.random() * 0.4 + 0.1};
    `;
    container.appendChild(p);
  }
</script>
</body>
</html>
